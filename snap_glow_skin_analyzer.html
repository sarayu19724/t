<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snap & Glow Analyzer</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding: 30px;
    }
    input, button, select {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }
    button {
      background: #ff6b6b;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    img {
      margin-top: 10px;
      width: 150px;
      border-radius: 10px;
    }
    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>📸 Snap & Glow Analyzer</h2>

<input type="file" accept="image/*" onchange="preview(event)">
<br>
<img id="img" />

<br>

<select id="concern">
  <option>Acne</option>
  <option>Dullness</option>
  <option>Tanning</option>
</select>

<br>

<input type="text" id="name" placeholder="Your Name" oninput="check()">

<br>

<input type="tel" id="phone" placeholder="10-digit phone"
oninput="this.value=this.value.replace(/[^0-9]/g,'');check()">

<br>

<button id="btn" onclick="analyze()" disabled>Analyze</button>

<p class="error" id="err"></p>
<h3 id="result"></h3>

<script>
function preview(e){
  let img = document.getElementById("img");
  img.src = URL.createObjectURL(e.target.files[0]);
}

function check(){
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();

  let validPhone = /^[0-9]{10}$/.test(phone);

  let btn = document.getElementById("btn");

  if(name && validPhone){
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

function analyze(){
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let concern = document.getElementById("concern").value;

  let validPhone = /^[0-9]{10}$/.test(phone);

  if(!validPhone){
    document.getElementById("err").innerText = "Enter valid 10-digit number";
    return;
  }

  document.getElementById("err").innerText = "";
  document.getElementById("result").innerText = "Analyzing... ⏳";

  setTimeout(()=>{
    let res = "";

    if(concern==="Acne"){
      res = "Anti-Acne Facial recommended";
    }
    else if(concern==="Dullness"){
      res = "Glow Facial + Hair Spa recommended";
    }
    else{
      res = "Detan Treatment recommended";
    }

    document.getElementById("result").innerText =
      "Hi "+name+"! "+res+" + ₹300 OFF 🎉";

  },2000);
}
</script>

</body>
</html>
